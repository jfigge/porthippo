<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: only load scripts/styles/fonts from the same origin. The renderer
      makes no network calls of its own — all I/O goes through the main process
      over window.porthippo.*.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        font-src    'self';
        img-src     'self' data:;
      "
    />
    <title>Port Hippo</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/16x16.png" />

    <!-- Design tokens + reset first, then the shell layout, then components. -->
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── App header ────────────────────────────────────────────────── -->
      <header id="app-header" aria-label="Application header">
        <div class="app-header-brand">
          <img
            class="app-header-icon"
            src="icons/48x48.png"
            width="24"
            height="24"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <span class="app-header-title">Port Hippo</span>
        </div>

        <!-- View toggle: Definition | Monitoring | Split -->
        <nav
          class="view-toggle"
          id="view-toggle"
          aria-label="View"
          role="tablist"
        >
          <button
            class="view-toggle-btn view-toggle-btn--active"
            data-view="definition"
            role="tab"
            type="button"
          >
            Definition
          </button>
          <button
            class="view-toggle-btn"
            data-view="monitoring"
            role="tab"
            type="button"
          >
            Monitoring
          </button>
          <button
            class="view-toggle-btn"
            data-view="split"
            role="tab"
            type="button"
          >
            Split
          </button>
        </nav>

        <div class="app-header-meta">
          <span id="app-version" class="app-header-version"></span>
        </div>
      </header>

      <!-- ── Content: two empty panes the later features fill in ───────── -->
      <main id="app-content" class="app-content" data-view="definition">
        <!-- Definition view (Feature 40) is mounted here by app.js. -->
        <section
          id="definition-view"
          class="pane pane-definition"
          aria-label="Definition"
        ></section>

        <!-- Monitoring view (Feature 50) is mounted here by app.js. -->
        <section
          id="monitoring-view"
          class="pane pane-monitoring"
          aria-label="Monitoring"
          hidden
        ></section>
      </main>
    </div>

    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
