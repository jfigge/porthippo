<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: only load scripts/styles/fonts from the same origin. The renderer
      makes no network calls of its own — all I/O goes through the main process
      over window.porthippo.*.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        font-src    'self';
        img-src     'self' data:;
      "
    />
    <title>Port Hippo</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/16x16.png" />

    <!-- Design tokens + reset first, then the shell layout, then components. -->
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── App header ────────────────────────────────────────────────── -->
      <header id="app-header" aria-label="Application header">
        <!-- Brand mark doubles as the About trigger (localized in app.js). -->
        <div
          class="app-header-brand"
          id="app-brand"
          role="button"
          tabindex="0"
          title="About Port Hippo"
          aria-label="About Port Hippo"
        >
          <img
            class="app-header-icon"
            src="icons/48x48.png"
            width="24"
            height="24"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <span class="app-header-title">SSH Tunnel Manager</span>
        </div>

        <!-- View toggle: Definition | Monitoring -->
        <nav
          class="view-toggle"
          id="view-toggle"
          aria-label="View"
          role="tablist"
        >
          <button
            class="view-toggle-btn view-toggle-btn--active"
            data-view="definition"
            role="tab"
            type="button"
          >
            Definition
          </button>
          <button
            class="view-toggle-btn"
            data-view="monitoring"
            role="tab"
            type="button"
          >
            Monitoring
          </button>
        </nav>

        <div class="app-header-meta">
          <button
            id="settings-btn"
            class="btn--icon app-header-settings"
            type="button"
            aria-label="Settings"
            title="Settings"
          >
            <!-- Feather-style gear (matches Rest Hippo); localized
                 aria-label/title set in app.js -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Content: two empty panes the later features fill in ───────── -->
      <main id="app-content" class="app-content" data-view="definition">
        <!-- Definition view (Feature 40) is mounted here by app.js. -->
        <section
          id="definition-view"
          class="pane pane-definition"
          aria-label="Definition"
        ></section>

        <!-- Monitoring view (Feature 50) is mounted here by app.js. -->
        <section
          id="monitoring-view"
          class="pane pane-monitoring"
          aria-label="Monitoring"
          hidden
        ></section>
      </main>
    </div>

    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
