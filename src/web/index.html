<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: only load scripts/styles/fonts from the same origin. The renderer
      makes no network calls of its own — all I/O goes through the main process
      over window.porthippo.*.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        font-src    'self';
        img-src     'self' data:;
      "
    />
    <title>Port Hippo</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/16x16.png" />

    <!-- Design tokens + reset first, then the shell layout, then components. -->
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── App header ────────────────────────────────────────────────── -->
      <header id="app-header" aria-label="Application header">
        <!-- Brand lockup: only the icon button opens About (localized in
             app.js); the logo + subtitle text are not clickable. -->
        <div class="app-header-brand">
          <button
            class="app-header-icon-btn"
            id="app-brand"
            type="button"
            title="About Port Hippo"
            aria-label="About Port Hippo"
          >
            <img
              class="app-header-icon"
              src="porthippo-icon.svg"
              width="28"
              height="28"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          </button>
          <span class="app-logo">Port Hippo</span>
          <span class="app-subtitle">SSH Tunnel Manager</span>
        </div>

        <div class="app-header-meta">
          <!-- View-mode selector (cards ↔ list); localized + wired in app.js. -->
          <select
            id="view-mode"
            class="app-header-view-select"
            aria-label="View mode"
          >
            <option value="cards">Cards</option>
            <option value="list">List</option>
          </select>

          <span class="app-header-sep" aria-hidden="true"></span>

          <button
            id="settings-btn"
            class="btn--icon app-header-settings"
            type="button"
            aria-label="Settings"
            title="Settings"
          >
            <!-- Feather-style gear (matches Rest Hippo); localized
                 aria-label/title set in app.js -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Content: the single master-detail Tunnels surface ─────────── -->
      <main id="app-content" class="app-content">
        <!-- TunnelsView (sidebar list + detail panel) is mounted here by app.js. -->
        <section
          id="tunnels-view"
          class="pane pane-tunnels"
          aria-label="Tunnels"
        ></section>
      </main>
    </div>

    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
