<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Port Hippo app icon">
  <title>Port Hippo icon</title>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="#4785F0"/>
  <!-- ears -->
  <circle cx="170" cy="146" r="40" fill="#FFFFFF"/>
  <circle cx="342" cy="146" r="40" fill="#FFFFFF"/>
  <!-- head -->
  <rect x="144" y="140" width="224" height="190" rx="74" fill="#FFFFFF"/>
  <rect x="118" y="260" width="276" height="150" rx="74" fill="#FFFFFF"/>
  <!-- eyes -->
  <circle cx="201" cy="198" r="17" fill="#1C1C1C"/>
  <circle cx="311" cy="198" r="17" fill="#1C1C1C"/>
  <!-- port link between the nostrils: the on-demand tunnel motif -->
  <line x1="210" y1="332" x2="302" y2="332" stroke="#4785F0" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="210" cy="332" rx="18" ry="23" fill="#1C1C1C"/>
